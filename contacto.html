<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Banner con Video de Fondo</title>
    <link rel="stylesheet" href="contacto1.css">
</head>
<body>
    <!-- Menú de Navegación -->
    <header>
        <nav class="navbar">
            <div class="logo">MiSitio</div>
            <ul class="nav-links">
                <li><a href="#home">Inicio</a></li>
                <li><a href="#about">Acerca de</a></li>
                <li><a href="#services">Servicios</a></li>
                <li><a href="#contact">Contacto</a></li>
            </ul>
            <div class="menu-icon" onclick="toggleMenu()">☰</div>
        </nav>
    </header>

    <!-- Banner con video de fondo -->
    <section class="banner">
        <video autoplay muted loop class="bg-video">
            <source src="video.mp4" type="video/mp4">
            Tu navegador no soporta videos de fondo.
        </video>
        <div class="banner-content">
            <h1>Bienvenidos a Mi Sitio</h1>
            <p>Un lugar donde tus ideas cobran vida</p>
            <div class="buttons">
                <a href="#about" class="btn">Conoce Más</a>
                <a href="#contact" class="btn btn-alt">Contáctanos</a>
            </div>
        </div>
    </section>

    <script src="script2.js"></script>
</body>
</html>
