<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Información de Contacto</title>
  <style>
    body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  background-color: #f4f4f4;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  padding: 20px;
}

.contact-form, .visualizations {
  flex: 1 1 45%;
  background: #800000;
  color: white;
  padding: 20px;
  margin: 10px;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
}

.contact-form h1, .visualizations p {
  margin-bottom: 10px;
}

form label {
  display: block;
  margin: 10px 0 5px;
}

form input, form textarea, form select, form button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border: none;
  border-radius: 5px;
}

form button {
  background: #f4f4f4;
  color: #800000;
  font-weight: bold;
  cursor: pointer;
}

form button:hover {
  background: #dcdcdc;
}

.visualizations {
  background-color: #add8e6;
  color: #333;
  text-align: center;
}

.visualizations .counter {
  font-size: 36px;
  font-weight: bold;
  margin-bottom: 20px;
}

  </style>
</head>
<body>
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Contador de Visualizaciones</title>
      <link rel="stylesheet" href="styles.css">
    </head>
    <body>
      <div class="container">
        <div class="contact-form">
          <h1>Contact Us to Request Your Consultation</h1>
          <form>
            <label for="first-name">First Name</label>
            <input type="text" id="first-name" placeholder="First Name">
    
            <label for="last-name">Last Name</label>
            <input type="text" id="last-name" placeholder="Last Name">
    
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="Phone Number">
    
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Email">
    
            <label for="new-client">Are you a new client?</label>
            <select id="new-client">
              <option value="yes">Yes</option>
              <option value="no">No</option>
            </select>
    
            <label for="message">How can we help you?</label>
            <textarea id="message" placeholder="Write your message here"></textarea>
    
            <button type="submit">Send Message</button>
          </form>
        </div>
    
        <div class="visualizations">
          <div class="counter">
            <h1 id="visit-counter">0</h1>
            <p>Page Views</p>
          </div>
          <p>Schedule Your Consultation Today</p>
          <p><strong>(646) 355-1560</strong></p>
          <p>560 W 180th Street Suite 302<br>New York, NY 10033</p>
        </div>
      </div>
      <script src="script.js"></script>
      
    </body>
    </html>
